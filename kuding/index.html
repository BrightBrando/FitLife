<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitLife - Simple Fitness Website</title>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif; /* Futuristic fitness vibe */
    }
    video {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    a {
      text-decoration: none;
    }
    button {
      background: transparent;
      border: transparent;
      color: #ffffff;
      font-size: 2.5rem;
      font-weight: bold;
      padding: 15px 40px;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }
    button:hover {
      background: rgba(0, 255, 153, 0.2);
      text-shadow: 0 0 15px #4a9074, 0 0 30px #16885b;
      border-color: #ffffff;
    }
    
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2rem;
  padding: 2rem;
  justify-items: center;
}

.card{
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);
  padding: 40px;
}

.card img{
  width: 450px;
  height: auto;
  display: block;
  transition: opacity 0.3s ease;
  filter: drop-shadow(0 0 20px rgba(0,255,150,0.6));
}

.card .text{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 4rem;
  font-weight: bold;
  opacity: 0;
  text-shadow: 0 0 15px #00ff99, 0 0 30px #00ff99;
  transition: opacity 0.3s ease;
}

.card:hover::after {
  opacity: 1;
}

.card:hover .text {
  opacity: 1;
  font-size: 5rem;
}

.card:hover img {
  opacity: 0;
}

.card:hover {
  transform: scale(1.05);
  transition: transform 0.3s ease;
}
  </style>

</head>
<body>
  <video autoplay muted loop>
    <source src="green.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="content">
    <div class="card">
      <a href="start.html">
        <img src="logo.png">
        <div class="text">Start a FitLife!</div>
      </a>
    </div>
  </div>
</body>
</html>
