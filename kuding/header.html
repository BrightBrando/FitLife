<html>
<head>
<title>FitLife</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background-color:mintcream;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 40px;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(6px);
    position:sticky;
    top:0;
}

/* LOGO SECTION */
.logo-section{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    width:55px;
}

.site-name{
    font-size:28px;
    color:rgb(98,174,144);
    font-weight:bold;
}

/* NAVIGATION */
.nav{
    display:flex;
    gap:25px;
}

.nav a{
    text-decoration:none;
    color:rgb(98,174,144);
    font-weight:bold;
    position:relative;
}

/* Hover underline animation */
.nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:rgb(2,131,94);
    transition:0.3s;
}

.nav a:hover::after{
    width:100%;
}

</style>

</head>

<body>

<header>

<div class="logo-section">
<img src="logo.png" class="logo">
<div class="site-name">FitLife</div>
</div>

<nav class="nav">
<a href="start.html" target="content">Home</a>
<a href="About.html" target="content">About</a>
<a href="Me.html" target="content">Developers</a>
</nav>

</header>

</body>
</html>
