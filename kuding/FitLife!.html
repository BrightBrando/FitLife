<!DOCTYPE html>
<html lang="en">
<head>
<style>




.start {


    position: relative;
    padding: 50px;
    margin: 250px;
    background: lightblue;
    text-align: center;
}


button {

    padding: 30px;
    cursor: pointer;
    position: relative;
    z-index: 2;
}

.startb {

    border-radius: 50%;
}

a{

    color: inherit;
    text-decoration: none;
}


.gif{

    
    position: absolute;
    width: 120px;
    opacity: 0;
    transform: scale(0);
    transition: 0.4s ease;
}

.gif1{
    top: -150px;
    left: -150px;
}

.gif2{
    top: -150px;
    right: -150px;
}

.gif3{
    bottom: -150px;
    left: -150px;
}

.gif4{
    bottom: -150px;
    right: -150px;
}


.startb:hover ~ .gif{
    opacity: 1;
    transform: scale(1);
}

</style>
<title>FitLife!</title>
</head>

<body bgcolor="white">

<div class="start">

<button class="startb">
<a href="start.html"><h1>Start FitLife!</h1></a>
</button>

<img src="runstick.gif" class="gif gif1">
<img src="runstick.gif" class="gif gif2">
<img src="runstick.gif" class="gif gif3">
<img src="runstick.gif" class="gif gif4">

</div>

</body>
</html>
