<style>
/* General */
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background-color: mintcream;
    color: #222;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 40px;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(6px);
    position:sticky;
    top:0;
    z-index:10;
}

.logo-section{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    width:50px;
}

.site-name{
    font-size:26px;
    color:rgb(98,174,144);
    font-weight:bold;
}

.nav{
    display:flex;
    gap:20px;
}

.nav a{
    text-decoration:none;
    color:rgb(98,174,144);
    font-weight:bold;
    position:relative;
}

.nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:rgb(2,131,94);
    transition:0.3s;
}

.nav a:hover::after{
    width:100%;
}

/* HERO SECTION */
.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    height:20vh;
    background: url('muscle-hero.jpg') center/cover no-repeat;
    color:white;
    text-shadow: 0 0 10px black;
    font-size:2.5rem;
    text-align:center;
}

/* CONTENT SECTION */
section{
    padding:50px 20px;
    max-width:1200px;
    margin:auto;
}

h2{
    color:rgb(98,174,144);
    text-align:center;
    margin-bottom:30px;
}

/* EXERCISES GRID */
.exercises{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.exercise-card{
    background: whitesmoke;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    overflow:hidden;
    transition:transform 0.3s;
    text-align:center;
}

.exercise-card:hover{
    transform: scale(1.05);
}

.exercise-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.exercise-card h3{
    margin:15px 0 5px 0;
    color: inherit;
text-decoration: none;
}

.exercise-card p{
    padding:0 10px 15px 10px;
    font-size:0.9rem;
    color:#555;
}

/* CTA BUTTON */
.cta{
    display:flex;
    justify-content:center;
    margin-top:40px;
}

.cta button{
    padding:15px 30px;
    font-size:1.2rem;
    background-color:rgb(98,174,144);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:all 0.3s;
}

.cta button:hover{
    background-color:rgb(2,131,94);
    box-shadow:0 0 15px #00ff99;
}
.a{
color: inherit !important;
text-decoration: none !important;
/* bkt ayaw gumana neto tangina*/
}
</style>
</head>
